# Example ApplicationSet for Minikube chart deployments.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: trinity-platform
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - list:
        elements:
          - env: minikube
            namespace: trinity
            valuesFile: values.minikube.yaml
  template:
    metadata:
      name: 'trinity-{{ .env }}'
      labels:
        app.kubernetes.io/name: trinity-platform
        app.kubernetes.io/part-of: trinity-platform
        trinity.work/environment: '{{ .env }}'
    spec:
      project: default
      source:
        repoURL: https://github.com/spoonbobo/trinity.git
        targetRevision: main
        path: k8s/charts/trinity-platform
        helm:
          releaseName: trinity
          valueFiles:
            - '{{ .valuesFile }}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{ .namespace }}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
