# Per-user OpenClaw configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "openclaw.name" . }}-config
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "openclaw.labels" . | nindent 4 }}
data:
  openclaw.json: |
    {
      "gateway": {
        "port": {{ .Values.port }},
        "mode": "local",
        "bind": "lan",
        "controlUi": {
          "dangerouslyAllowHostHeaderOriginFallback": true,
          "dangerouslyDisableDeviceAuth": true
        },
        "auth": {
          "mode": "token"
        }
      },
      "agents": {
        "defaults": {
          "workspace": "/home/node/.openclaw/workspace",
          "sandbox": {
            "mode": "off",
            "scope": "agent"
          }
        }
      },
      "tools": {
        "profile": "full",
        "web": {
          "search": { "enabled": true },
          "fetch": { "enabled": true }
        }
      },
      "browser": {
        "enabled": true,
        "defaultProfile": "openclaw",
        "headless": true,
        "noSandbox": true,
        "profiles": {
          "openclaw": {
            "cdpPort": 18800,
            "color": "#FF4500"
          }
        }
      }
    }
