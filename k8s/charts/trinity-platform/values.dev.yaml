# Dev overlay -- smaller resources, single replicas, dev mode enabled
global:
  namespace: trinity-dev
  imagePullPolicy: Always
  storageClass: ""

urls:
  apiExternalUrl: "https://app.dev.trinity.work"
  siteUrl: "https://dev.trinity.work"
  allowedOrigins: "https://app.dev.trinity.work,https://dev.trinity.work"

vault:
  devMode: true

supabaseDb:
  storage: 2Gi
  resources:
    limits:
      memory: 512Mi
    requests:
      memory: 256Mi
      cpu: 100m

keycloak:
  resources:
    limits:
      memory: 512Mi
    requests:
      memory: 256Mi
      cpu: 100m

gatewayOrchestrator:
  replicas: 1
  resources:
    limits:
      memory: 128Mi
    requests:
      memory: 64Mi
      cpu: 50m

gatewayProxy:
  replicas: 1
  resources:
    limits:
      memory: 256Mi
    requests:
      memory: 128Mi
      cpu: 100m

loki:
  storage: 2Gi
grafana:
  storage: 1Gi

site:
  enabled: true
  host: "dev.trinity.work"
  tlsSecretName: "trinity-dev-site-tls"
  resources:
    limits:
      memory: 128Mi
    requests:
      memory: 64Mi
      cpu: 50m

ingress:
  enabled: true
  host: "app.dev.trinity.work"
  tls:
    enabled: true
    secretName: "trinity-dev-app-tls"

superadmin:
  enabled: true
  email: "admin@trinity.local"
