# Fluent-bit configuration for Trinity AGI
# Collects logs from Docker Compose services and forwards to Loki

[SERVICE]
    Flush        5
    Daemon       Off
    Log_Level    info
    Parsers_File parsers.conf

[INPUT]
    Name              tail
    Path              /var/lib/docker/containers/*/*.log
    Parser            docker
    Tag               docker.*
    Refresh_Interval  5
    Mem_Buf_Limit     50MB
    Skip_Long_Lines   On
    DB                /var/log/flb_docker.db

# NOTE: Kubernetes filter removed -- this stack runs on Docker Compose, not K8s.
# The kubernetes filter would fail silently (no K8s API available).

[FILTER]
    Name          modify
    Match         *
    Add           cluster trinity-agi
    Add           environment development

[OUTPUT]
    Name            loki
    Match           *
    Host            loki
    Port            3100
    Labels          {job="fluent-bit"}
    Line_Format     json
    Log_Level       info
